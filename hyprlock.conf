general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = /home/noname/Downloads/tokyo.jpg# <-- Update this path!
    blur_passes = 1
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}


input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(255, 0, 0, 0.8) # Deep ghoul red
    inner_color = rgba(0, 0, 0, 0.4)   # Semi-transparent black
    font_color = rgb(255, 255, 255)
    fade_on_empty = true
    placeholder_text = katherine's
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}

