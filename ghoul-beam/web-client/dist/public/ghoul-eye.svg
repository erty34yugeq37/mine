<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Black sclera (ghoul eye) -->
  <circle cx="50" cy="50" r="48" fill="#000000"/>
  <!-- Red iris -->
  <circle cx="50" cy="50" r="34" fill="url(#irisGrad)"/>
  <!-- Dark pupil -->
  <circle cx="50" cy="50" r="16" fill="#0a0000"/>
  <!-- Iris highlight -->
  <circle cx="40" cy="40" r="6" fill="rgba(255,100,50,0.4)"/>
  <!-- Red glow ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#8b0000" stroke-width="2" opacity="0.8"/>
  <defs>
    <radialGradient id="irisGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff3300"/>
      <stop offset="50%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#2d0000"/>
    </radialGradient>
  </defs>
</svg>
